name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  client-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install client (dev)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./packages/client[dev]"

      - name: Run tests
        run: |
          python -m pytest -q
        working-directory: ./packages/client
